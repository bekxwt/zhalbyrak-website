<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: white;
        }

        .gallery-container {
            column-count: 4;
            column-gap: 15px;
            padding: 20px;
        }

        @media (max-width: 1200px) {
            .gallery-container { column-count: 3; }
        }

        @media (max-width: 800px) {
            .gallery-container { column-count: 2; }
        }

        @media (max-width: 500px) {
            .gallery-container { column-count: 1; }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            border-radius: 12px;
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: background 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<a href="../portfolio.html" class="back-link">← Back to Portfolio</a>

<div class="gallery-container">

    <div class="gallery-item"><img src="assets/images/work1.jpg" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work2.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work3.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work4.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work5.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work6.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work7.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work8.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work9.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work10.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work11.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work12.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work13.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work14.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work15.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work16.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work17.png" alt=""></div>
    <div class="gallery-item"><img src="assets/images/work18.png" alt=""></div>

</div>

<div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="">
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const items = document.querySelectorAll('.gallery-item img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    items.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            lightboxImg.src = img.src;
        });
    });

    lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none';
    });
});
</script>

</body>
</html>
