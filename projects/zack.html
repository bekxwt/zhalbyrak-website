<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack D Films</title>
    <link rel="stylesheet" href="../assets/css/project_pages.css">
</head>

<div class="lightbox-overlay" id="lightbox">
    <img src="" alt="Full View">
</div>

<body>

<div class="project-container">

    <a href="../portfolio.html" class="back-link">← Back to Portfolio</a>

    <h1 class="project-title">Zack D Films</h1>
    <p class="project-meta">Blender • VFX • Simulation</p>

    <!-- DESCRIPTION -->
    <div class="project-description">
        <p>
            This personal project is the result of me trying to apply my work to Zack D Films.
        </p>
    </div>

        <!-- EXTRA SECTION -->
    <div class="project-section">
        <h3>Techniques Used</h3>
        <div class="project-tags">
            <span class="tag">Blender</span>
            <span class="tag">Character animation & rigging</span>
            <span class="tag">Shader editing & material creation</span>
            <span class="tag">Geometry nodes</span>
            <span class="tag">Lighting</span>
            <span class="tag">Compositing</span>
        </div>
    </div>

    <!-- MEDIA WRAPPER -->
    <div class="project-media-wrapper">

        <!-- Video -->
        <div class="project-media horizontal">
            <iframe 
                src="https://www.youtube.com/embed/WjBuBdX2KXI" 
                title="Zack D Films" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- Images: add/remove images as needed -->
        <div class="project-images">
            <a href="../assets/img/projects/zack1.png" class="lightbox-link">
                <img src="../assets/img/projects/zack1.png" alt="Step 1" class="horizontal">
            </a>
            <a href="../assets/img/projects/zack2.png" class="lightbox-link">
                <img src="../assets/img/projects/zack2.png" alt="Step 2" class="horizontal">
            </a>
            <a href="../assets/img/projects/zack3.png" class="lightbox-link">
                <img src="../assets/img/projects/zack3.png" alt="Step 3" class="horizontal">
            </a>
            <a href="../assets/img/projects/zack4.png" class="lightbox-link">
                <img src="../assets/img/projects/zack4.png" alt="Step 4" class="horizontal">
            </a>
            <a href="../assets/img/projects/zack5.png" class="lightbox-link">
                <img src="../assets/img/projects/zack5.png" alt="Step 5" class="horizontal">
            </a>
            <a href="../assets/img/projects/zack6.png" class="lightbox-link">
                <img src="../assets/img/projects/zack6.png" alt="Step 6" class="horizontal">
            </a>
        </div>

    </div>
</div>
<script>
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const links = document.querySelectorAll('.lightbox-link');

links.forEach(link => {
    link.addEventListener('click', e => {
        e.preventDefault();
        lightboxImg.src = link.href;
        lightbox.style.display = 'flex';
    });
});

// Close lightbox when clicked
lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
    lightboxImg.src = '';
});
</script>
</body>
</html>
